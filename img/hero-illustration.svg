<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      @keyframes energyFlow {
        0% { stroke-dashoffset: 100; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes pulseSoft {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.6; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.3; r: 4; }
        50% { opacity: 0.8; r: 7; }
      }
      @keyframes batteryFill {
        0% { y: 60; height: 0; }
        100% { y: 10; height: 50; }
      }
      @keyframes batteryPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes driveIn {
        0% { transform: translateX(-80px); opacity: 0; }
        40% { opacity: 1; }
        100% { transform: translateX(0); opacity: 1; }
      }
      .energy-line { animation: energyFlow 1.8s ease-in-out infinite; }
      .energy-line-2 { animation: energyFlow 2.2s ease-in-out infinite 0.3s; }
      .energy-line-3 { animation: energyFlow 2.6s ease-in-out infinite 0.6s; }
      .pulse-dot { animation: pulse 2s ease-in-out infinite; }
      .pulse-dot-2 { animation: pulse 2.5s ease-in-out infinite 0.5s; }
      .pulse-subtle { animation: pulseSoft 3s ease-in-out infinite; }
      .wheel-spin { animation: spin 3s linear infinite; transform-origin: center; }
      .wheel-spin-2 { animation: spin 3s linear infinite 0.15s; transform-origin: center; }
      .float-up { animation: float 4s ease-in-out infinite; }
      .float-up-2 { animation: float 4.5s ease-in-out infinite 0.8s; }
      .float-up-3 { animation: float 3.8s ease-in-out infinite 1.6s; }
      .battery-fill { animation: batteryFill 4s ease-in-out infinite; }
      .battery-pulse { animation: batteryPulse 1.5s ease-in-out infinite; }
      .car-body { animation: driveIn 1.2s ease-out both; }
      .fade-in { animation: fadeIn 1s ease-out both; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes connectorSlide {
        0% { transform: translateX(-20px); opacity: 0; }
        100% { transform: translateX(0); opacity: 1; }
      }
      .connector-appear { animation: connectorSlide 0.8s ease-out 0.5s both; }
      @keyframes ringRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .ring-rotate { animation: ringRotate 8s linear infinite; transform-origin: 650px 100px; }
      .ring-rotate-2 { animation: ringRotate 12s linear infinite reverse; transform-origin: 650px 100px; }
    </style>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c15"/>
      <stop offset="40%" stop-color="#0a1a1c"/>
      <stop offset="70%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#0f0d24"/>
    </linearGradient>
    <linearGradient id="chargeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="chargeGlow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="battGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="stationGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="battClip">
      <rect x="150" y="10" width="22" height="50" rx="2"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="24"/>

  <!-- Ambient glow behind car -->
  <ellipse cx="350" cy="380" rx="220" ry="80" fill="#34d399" opacity="0.04" filter="url(#ambientGlow)"/>
  <ellipse cx="350" cy="380" rx="150" ry="50" fill="#60a5fa" opacity="0.03" filter="url(#ambientGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="800" y2="80" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="500" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Orbital rings -->
  <g class="ring-rotate" opacity="0.12">
    <ellipse cx="650" cy="100" rx="70" ry="18" fill="none" stroke="#34d399" stroke-width="1"/>
  </g>
  <g class="ring-rotate-2" opacity="0.08">
    <ellipse cx="650" cy="100" rx="95" ry="25" fill="none" stroke="#60a5fa" stroke-width="0.8"/>
  </g>

  <!-- Floating ambient particles -->
  <circle cx="120" cy="60" r="2" fill="#34d399" class="float-up" opacity="0.5"/>
  <circle cx="280" cy="90" r="1.5" fill="#60a5fa" class="float-up-2" opacity="0.4"/>
  <circle cx="520" cy="45" r="2" fill="#34d399" class="float-up-3" opacity="0.5"/>
  <circle cx="680" cy="160" r="1.5" fill="#60a5fa" class="float-up" opacity="0.3"/>
  <circle cx="160" cy="280" r="1" fill="#34d399" class="float-up-2" opacity="0.3"/>
  <circle cx="740" cy="300" r="1.5" fill="#60a5fa" class="float-up-3" opacity="0.35"/>

  <!-- ═══ HOUSE ═══ -->
  <g transform="translate(60, 180)" class="fade-in" style="animation-delay: 0.2s">
    <rect x="15" y="55" width="160" height="130" rx="6" fill="url(#houseGrad)" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
    <!-- Roof -->
    <polygon points="-5,55 95,5 195,55" fill="#0d4f1c" stroke="#22c55e" stroke-width="1.5"/>
    <line x1="95" y1="5" x2="95" y2="55" stroke="#22c55e" stroke-width="0.8" opacity="0.3"/>
    <!-- Solar panels on roof -->
    <g opacity="0.5">
      <rect x="30" y="22" width="18" height="12" rx="1" fill="#34d399" opacity="0.3"/>
      <rect x="52" y="22" width="18" height="12" rx="1" fill="#34d399" opacity="0.3"/>
      <rect x="74" y="22" width="18" height="12" rx="1" fill="#34d399" opacity="0.3"/>
      <rect x="96" y="22" width="18" height="12" rx="1" fill="#34d399" opacity="0.3"/>
      <rect x="118" y="22" width="18" height="12" rx="1" fill="#34d399" opacity="0.3"/>
      <rect x="140" y="22" width="18" height="12" rx="1" fill="#34d399" opacity="0.3"/>
      <line x1="10" y1="18" x2="180" y2="18" stroke="#34d399" stroke-width="0.5" opacity="0.2"/>
    </g>
    <!-- Door -->
    <rect x="78" y="105" width="34" height="80" rx="3" fill="#0a0e17" stroke="#22c55e" stroke-width="1"/>
    <circle cx="104" cy="148" r="3" fill="#34d399" class="battery-pulse"/>
    <!-- Garage door -->
    <rect x="15" y="75" width="35" height="110" rx="2" fill="#0a0e17" stroke="#22c55e" stroke-width="0.8" opacity="0.6"/>
    <!-- Windows -->
    <rect x="128" y="72" width="35" height="26" rx="2" fill="#0a0e17" stroke="#22c55e" stroke-width="1"/>
    <rect x="130" y="74" width="31" height="22" rx="1" fill="#34d399" class="pulse-subtle" opacity="0.15"/>

    <!-- Wall charger -->
    <rect x="160" y="35" width="14" height="20" rx="3" fill="#22c55e"/>
    <circle cx="167" cy="44" r="3" fill="white" filter="url(#glow)"/>
  </g>

  <!-- ═══ EV CHARGER STATION ═══ -->
  <g transform="translate(450, 195)" class="fade-in" style="animation-delay: 0.6s">
    <!-- Station body -->
    <rect x="-30" y="0" width="60" height="100" rx="10" fill="url(#stationGrad)" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="-22" y="10" width="44" height="40" rx="5" fill="#0a0e17"/>
    <rect x="-18" y="14" width="36" height="32" rx="3" fill="#22c55e" class="pulse-subtle" opacity="0.15"/>
    <!-- Screen content -->
    <text x="0" y="32" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="8" font-weight="bold">CHARGING</text>
    <rect x="-10" y="38" width="20" height="3" rx="1" fill="#34d399" opacity="0.6"/>
    <!-- LED indicators -->
    <circle cx="-16" cy="62" r="3" fill="#34d399" class="pulse-dot" filter="url(#glow)"/>
    <circle cx="-6" cy="62" r="2.5" fill="#22c55e" opacity="0.5"/>
    <circle cx="4" cy="62" r="2.5" fill="#22c55e" opacity="0.3"/>
    <circle cx="14" cy="62" r="2.5" fill="#22c55e" opacity="0.2"/>
    <!-- Cable management nub -->
    <rect x="-6" y="75" width="12" height="8" rx="2" fill="#22c55e"/>
    <rect x="-10" y="90" width="20" height="10" rx="3" fill="#1a2332" stroke="#22c55e" stroke-width="1"/>
  </g>

  <!-- ═══ CHARGING CABLE WITH ENERGY FLOW ═══ -->
  <g>
    <!-- Cable path -->
    <path d="M456 290 Q470 320 500 340 Q540 365 420 365 Q370 365 370 355 Q370 345 380 340" stroke="#1e293b" stroke-width="6" fill="none"/>
    <path d="M456 290 Q470 320 500 340 Q540 365 420 365 Q370 365 370 355 Q370 345 380 340" stroke="#22c55e" stroke-width="2" fill="none" opacity="0.4"/>

    <!-- Energy particles flowing along cable (3 offset streams) -->
    <path d="M456 290 Q470 320 500 340 Q540 365 420 365 Q370 365 370 355 Q370 345 380 340" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="8 12" class="energy-line" filter="url(#glow)"/>
    <path d="M456 290 Q470 320 500 340 Q540 365 420 365 Q370 365 370 355 Q370 345 380 340" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-dasharray="6 16" class="energy-line-2" filter="url(#glow)"/>
    <path d="M456 290 Q470 320 500 340 Q540 365 420 365 Q370 365 370 355 Q370 345 380 340" stroke="#34d399" stroke-width="1" fill="none" stroke-dasharray="4 20" class="energy-line-3" filter="url(#glow)"/>

    <!-- Charging connector handle (animates in) -->
    <g class="connector-appear">
      <rect x="370" y="332" width="22" height="14" rx="5" fill="#22c55e"/>
      <rect x="365" y="334" width="5" height="10" rx="2" fill="#1a2332" stroke="#22c55e" stroke-width="1"/>
      <!-- Connector glow -->
      <rect x="365" y="336" width="6" height="6" rx="1" fill="#34d399" filter="url(#glow)" opacity="0.6" class="battery-pulse"/>
    </g>
  </g>

  <!-- ═══ EV CAR (MAIN SUBJECT) ═══ -->
  <g transform="translate(200, 290)" class="car-body" style="animation-delay: 0.3s">
    <!-- Ground reflection -->
    <ellipse cx="160" cy="130" rx="170" ry="8" fill="#34d399" opacity="0.03"/>

    <!-- Car shadow -->
    <ellipse cx="160" cy="128" rx="130" ry="8" fill="black" opacity="0.3"/>

    <!-- Lower body / battery pack visible underneath -->
    <rect x="40" y="90" width="240" height="12" rx="4" fill="#22c55e" opacity="0.15"/>
    <rect x="80" y="94" width="60" height="4" rx="2" fill="#34d399" opacity="0.3"/>

    <!-- Main car body -->
    <path d="M30 90 L25 55 Q22 40 35 40 L55 40 L80 15 Q90 2 105 2 L225 2 Q240 2 250 15 L270 40 L295 40 Q308 40 305 55 L300 90 Z" fill="url(#carBody)" stroke="#60a5fa" stroke-width="1.5"/>

    <!-- Body highlight -->
    <path d="M35 88 L30 60 Q28 48 38 48 L55 48 L78 22 Q85 12 98 12 L220 12 Q235 12 245 22 L265 48 L290 48 Q300 48 298 60 L293 88 Z" fill="#60a5fa" opacity="0.05"/>

    <!-- Windshield -->
    <path d="M60 50 L82 20 Q90 8 105 8 L135 8 L165 50 Z" fill="#0a1628" opacity="0.7"/>
    <path d="M63 50 L84 22 Q90 10 104 10 L133 10 L162 50 Z" fill="#60a5fa" opacity="0.08"/>

    <!-- Rear window -->
    <path d="M225 50 L210 10 Q205 4 195 4 L175 4 L175 50 Z" fill="#0a1628" opacity="0.6"/>

    <!-- Side windows -->
    <path d="M148 12 L175 12 L175 50 L148 50 Z" fill="#0a1628" opacity="0.5"/>
    <line x1="148" y1="12" x2="148" y2="50" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>

    <!-- Chrome trim -->
    <line x1="30" y1="90" x2="300" y2="90" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>

    <!-- Headlight -->
    <ellipse cx="298" cy="58" rx="6" ry="10" fill="#34d399" opacity="0.3"/>
    <ellipse cx="300" cy="58" rx="3" ry="6" fill="#34d399" opacity="0.5" class="battery-pulse"/>

    <!-- Taillight -->
    <rect x="24" y="58" width="5" height="12" rx="2" fill="#ef4444" opacity="0.4"/>

    <!-- Door line -->
    <line x1="175" y1="50" x2="175" y2="88" stroke="#60a5fa" stroke-width="0.5" opacity="0.2"/>

    <!-- Charging port on car -->
    <rect x="110" y="46" width="16" height="18" rx="4" fill="#0a0e17" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="113" y="50" width="10" height="10" rx="2" fill="#34d399" class="pulse-dot-2" filter="url(#glow)" opacity="0.6"/>

    <!-- Car battery indicator -->
    <rect x="140" y="56" width="24" height="10" rx="2" fill="#0a0e17" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <rect x="142" y="58" width="20" height="6" rx="1" fill="none" clip-path="url(#battClip)">
      <rect x="142" y="58" width="20" height="6" rx="1" fill="#34d399" class="battery-fill" opacity="0.8"/>
    </rect>

    <!-- Front wheel -->
    <g transform="translate(230, 102)">
      <circle cx="0" cy="0" r="26" fill="#0a0e17" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="24" fill="#0a0e17" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
      <g class="wheel-spin">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
        <line x1="-16" y1="0" x2="16" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
        <line x1="0" y1="-16" x2="0" y2="16" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
        <line x1="-11" y1="-11" x2="11" y2="11" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
        <line x1="-11" y1="11" x2="11" y2="-11" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
      </g>
      <circle cx="0" cy="0" r="5" fill="#3b82f6"/>
      <circle cx="0" cy="0" r="2" fill="white" opacity="0.5"/>
    </g>

    <!-- Rear wheel -->
    <g transform="translate(85, 102)">
      <circle cx="0" cy="0" r="26" fill="#0a0e17" stroke="#3b82f6" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="24" fill="#0a0e17" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
      <g class="wheel-spin-2">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
        <line x1="-16" y1="0" x2="16" y2="0" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
        <line x1="0" y1="-16" x2="0" y2="16" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
        <line x1="-11" y1="-11" x2="11" y2="11" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
        <line x1="-11" y1="11" x2="11" y2="-11" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
      </g>
      <circle cx="0" cy="0" r="5" fill="#3b82f6"/>
      <circle cx="0" cy="0" r="2" fill="white" opacity="0.5"/>
    </g>

    <!-- Charge glow effects on car body -->
    <rect x="108" y="42" width="20" height="26" rx="5" fill="none" stroke="#34d399" stroke-width="2" filter="url(#glowStrong)" class="battery-pulse" opacity="0.3"/>
  </g>

  <!-- ═══ ENERGY SPARK FLOATING OUT ═══ -->
  <g filter="url(#glow)">
    <polygon points="330,250 338,232 334,245 346,240 335,260 340,246" fill="#34d399" opacity="0.6" class="pulse-dot"/>
    <polygon points="360,268 365,256 363,263 370,260 364,274 367,266" fill="#60a5fa" opacity="0.4" class="pulse-dot-2"/>
  </g>

  <!-- ═══ ROAD LINE ═══ -->
  <g opacity="0.15">
    <line x1="0" y1="430" x2="800" y2="430" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="435" x2="800" y2="435" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <!-- Road dashes -->
    <line x1="50" y1="445" x2="130" y2="445" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="180" y1="445" x2="260" y2="445" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="310" y1="445" x2="390" y2="445" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="440" y1="445" x2="520" y2="445" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="570" y1="445" x2="650" y2="445" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="700" y1="445" x2="780" y2="445" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <!-- ═══ AMBIENT PARTICLES (ENERGY CHARGING ATMOSPHERE) ═══ -->
  <circle cx="380" cy="300" r="1.5" fill="#34d399" class="float-up" opacity="0.6"/>
  <circle cx="400" cy="280" r="1" fill="#60a5fa" class="float-up-2" opacity="0.4"/>
  <circle cx="420" cy="310" r="1.5" fill="#34d399" class="float-up-3" opacity="0.5"/>
  <circle cx="350" cy="290" r="1" fill="#60a5fa" class="float-up" opacity="0.3"/>
  <circle cx="440" cy="260" r="1.5" fill="#34d399" class="float-up-2" opacity="0.4"/>

  <!-- ═══ CORNER ACCENT GLOW ═══ -->
  <rect x="2" y="2" width="20" height="3" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="2" y="2" width="3" height="20" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="778" y="2" width="20" height="3" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="778" y="2" width="3" height="20" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="2" y="478" width="20" height="3" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="2" y="478" width="3" height="20" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="778" y="478" width="20" height="3" rx="1.5" fill="#34d399" opacity="0.2"/>
  <rect x="778" y="478" width="3" height="20" rx="1.5" fill="#34d399" opacity="0.2"/>

  <!-- ═══ "CHARGING" LABEL ═══ -->
  <g transform="translate(400, 390)" opacity="0.3">
    <text x="0" y="0" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="7" letter-spacing="4">⚡ CHARGING</text>
  </g>
</svg>
