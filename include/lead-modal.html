<!-- Lead Capture Modal -->
<div class="lead-modal-overlay" id="leadModal">
    <div class="lead-modal">
        <button class="lead-modal-close" onclick="CLOSE_LEAD()">✕</button>
        <div id="leadFormContainer">
            <h3>⚡ Get Free Quotes</h3>
            <p>Enter your info and we'll connect you with licensed installers in your area.</p>
            <form class="lead-form" id="leadForm" onsubmit="return SUBMIT_LEAD(event)">
                <input type="text" placeholder="Full Name" name="name" required>
                <input type="email" placeholder="Email Address" name="email" required>
                <input type="tel" placeholder="Phone Number" name="phone" required>
                <input type="text" placeholder="ZIP Code" name="zip" maxlength="5" pattern="[0-9]{5}" required>
                <select name="timeline">
                    <option value="">When do you need installation?</option>
                    <option value="ASAP">ASAP (within 1 week)</option>
                    <option value="Soon">Soon (1-4 weeks)</option>
                    <option value="Planning">Just planning</option>
                </select>
                <button type="submit">Get Free Quotes →</button>
                <p style="font-size:0.75rem;color:var(--text-muted);text-align:center">Your info is shared only with local installers. No spam.</p>
            </form>
        </div>
        <div id="leadSuccessContainer" style="display:none">
            <div class="lead-success">
                <div class="lead-success-icon">✅</div>
                <h4>You're All Set!</h4>
                <p>We'll connect you with licensed installers in your area shortly. Check your phone/email for quotes.</p>
            </div>
        </div>
    </div>
</div>
